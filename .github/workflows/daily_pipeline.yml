name: Daily Coverage Pipeline

on:
  schedule:
    # 10:00 AM hora Santiago (UTC-4 verano / UTC-3 invierno)
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r Scripts/requirements.txt

      - name: Resolve Supabase host to IPv4
        run: |
          python3 << 'EOF'
          import socket, os
          host = "db.ceprzonmxserzkxxkwrj.supabase.co"
          results = socket.getaddrinfo(host, 5432, socket.AF_INET)
          ipv4 = results[0][4][0]
          print(f"Resolved {host} -> {ipv4}")
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"PGHOST_IPV4={ipv4}\n")
          EOF

      - name: Run pipeline
        env:
          COPILOTO_EMAIL:    ${{ secrets.COPILOTO_EMAIL }}
          COPILOTO_PASSWORD: ${{ secrets.COPILOTO_PASSWORD }}
          PGPASSWORD:        ${{ secrets.PGPASSWORD }}

          # Conexión directa con IPv4 forzado
          PGHOST:     ${{ env.PGHOST_IPV4 }}
          PGPORT:     "5432"
          PGDATABASE: "postgres"
          PGUSER:     "postgres"

          TALLERES_XLSX:     Data/talleres.xlsx
          MASTER_FLOTA_XLSX: Data/master_Flota.xlsx
          RADIUS_KM:        "100"
          MAX_GPS_AGE_DAYS: "15"
          ASSIGN_MODE:      "both"
          LOCAL_TZ:         "America/Santiago"

        run: python Scripts/app.py
