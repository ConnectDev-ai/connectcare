name: Daily Coverage Pipeline

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r Scripts/requirements.txt

      - name: Diagnose environment
        run: |
          echo "=== psycopg packages ==="
          pip list | grep -i psycopg || echo "none found"
          echo "=== get_engine in app.py ==="
          grep -A2 "def get_engine" Scripts/app.py

      - name: Run pipeline
        env:
          COPILOTO_API_TOKEN: ${{ secrets.COPILOTO_API_TOKEN }}
          COPILOTO_EMAIL:     ${{ secrets.COPILOTO_EMAIL }}
          COPILOTO_PASSWORD:  ${{ secrets.COPILOTO_PASSWORD }}
          PGPASSWORD:         ${{ secrets.PGPASSWORD }}

          DATABASE_URL: "postgresql+psycopg://neondb_owner:${{ secrets.PGPASSWORD }}@ep-old-sky-am0be75w-pooler.c-5.us-east-1.aws.neon.tech:5432/neondb?sslmode=require"
          PGHOST:     "ep-old-sky-am0be75w-pooler.c-5.us-east-1.aws.neon.tech"
          PGPORT:     "5432"
          PGDATABASE: "neondb"
          PGUSER:     "neondb_owner"

          GEOTAB_DATABASE: ${{ secrets.GEOTAB_DATABASE }}
          GEOTAB_USERNAME: ${{ secrets.GEOTAB_USERNAME }}
          GEOTAB_PASSWORD: ${{ secrets.GEOTAB_PASSWORD }}

          TALLERES_XLSX:     Data/talleres.xlsx
          MASTER_FLOTA_XLSX: Data/master_Flota.xlsx
          RADIUS_KM:        "100"
          MAX_GPS_AGE_DAYS: "15"
          ASSIGN_MODE:      "both"
          LOCAL_TZ:         "America/Santiago"

        run: python Scripts/app.py
