name: Daily Coverage Pipeline

on:
  schedule:
    # 10:00 AM hora Santiago (UTC-4 verano / UTC-3 invierno)
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r Scripts/requirements.txt

      - name: Force IPv4 for Supabase (map hostname in /etc/hosts)
        run: |
          IPV4=$(python3 -c "
          import socket
          results = socket.getaddrinfo('db.ceprzonmxserzkxxkwrj.supabase.co', 5432, socket.AF_INET)
          print(results[0][4][0])
          ")
          echo "Resolved to IPv4: $IPV4"
          echo "$IPV4 db.ceprzonmxserzkxxkwrj.supabase.co" | sudo tee -a /etc/hosts

      - name: Run pipeline
        env:
          COPILOTO_EMAIL:    ${{ secrets.COPILOTO_EMAIL }}
          COPILOTO_PASSWORD: ${{ secrets.COPILOTO_PASSWORD }}
          PGPASSWORD:        ${{ secrets.PGPASSWORD }}

          PGHOST:     "db.ceprzonmxserzkxxkwrj.supabase.co"
          PGPORT:     "5432"
          PGDATABASE: "postgres"
          PGUSER:     "postgres"

          TALLERES_XLSX:     Data/talleres.xlsx
          MASTER_FLOTA_XLSX: Data/master_Flota.xlsx
          RADIUS_KM:        "100"
          MAX_GPS_AGE_DAYS: "15"
          ASSIGN_MODE:      "both"
          LOCAL_TZ:         "America/Santiago"

        run: python Scripts/app.py
